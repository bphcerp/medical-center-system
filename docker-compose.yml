secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
  db_name:
    file: ./secrets/db_name.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  email_user:
    file: ./secrets/email_user.txt
  email_pass:
    file: ./secrets/email_pass.txt
  totp_token_1:
    file: ./secrets/totpToken1.txt
  totp_token_2:
    file: ./secrets/totpToken2.txt
  totp_token_3:
    file: ./secrets/totpToken3.txt

services:
  db:
    image: "postgres:18.0-bookworm"
    env_file:
      - .env
    environment:
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB_FILE: /run/secrets/db_name
    secrets:
      - db_user
      - db_password
      - db_name
    ports:
      - "${PGPORT}:${PGPORT}"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "medc" ]
      interval: 3s
      timeout: 3s
      retries: 3
    volumes:
      - postgres-data:/var/lib/postgresql/18/docker
    profiles:
      - "dev"
      - "prod"
      - "manual"

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: pgweb
    ports:
      - "12500:12500"
    secrets:
      - db_user
      - db_name
      - db_password
    entrypoint: [ "sh", "-c" ]
    command: >
      'export USER=$$(cat /run/secrets/db_user) &&
       export PASS=$$(cat /run/secrets/db_password) &&
       export DB=$$(cat /run/secrets/db_name) &&
       /usr/bin/pgweb --bind=0.0.0.0 --listen=12500 --url=postgres://$$USER:$$PASS@db:5432/$$DB?sslmode=disable'

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0 -port=${SEAWEEDFS_MASTER_PORT} -mdir=/data"
    ports:
      - "${SEAWEEDFS_MASTER_PORT}:${SEAWEEDFS_MASTER_PORT}"
    volumes:
      - seaweedfs-master-data:/data
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${SEAWEEDFS_MASTER_PORT}/cluster/status" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - "dev"
      - "prod"

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    command: "volume -mserver=seaweedfs-master:${SEAWEEDFS_MASTER_PORT} -ip=seaweedfs-volume -ip.bind=0.0.0.0 -port=${SEAWEEDFS_VOLUME_PORT} -max=100 -dir=/data"
    ports:
      - "${SEAWEEDFS_VOLUME_PORT}:${SEAWEEDFS_VOLUME_PORT}"
    volumes:
      - seaweedfs-volume-data:/data
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    profiles:
      - "dev"
      - "prod"

  app:
    build:
      context: ./
      dockerfile: ./Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
      seaweedfs-master:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB_FILE: /run/secrets/db_name
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      EMAIL_USER_FILE: /run/secrets/email_user
      EMAIL_PASS_FILE: /run/secrets/email_pass
      TOTP_TOKEN_1_FILE: /run/secrets/totp_token_1
      TOTP_TOKEN_2_FILE: /run/secrets/totp_token_2
      TOTP_TOKEN_3_FILE: /run/secrets/totp_token_3
    secrets:
      - db_user
      - db_password
      - db_name
      - jwt_secret
      - email_user
      - email_pass
      - totp_token_1
      - totp_token_2
      - totp_token_3
    volumes:
      - type: bind
        source: ./src
        target: /usr/local/app/src
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${FRONTEND_PORT}:3000"
    profiles:
      - "dev"

  app-prod:
    build:
      context: ./
      dockerfile: ./Dockerfile.prod
    depends_on:
      db:
        condition: service_healthy
      seaweedfs-master:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB_FILE: /run/secrets/db_name
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      EMAIL_USER_FILE: /run/secrets/email_user
      EMAIL_PASS_FILE: /run/secrets/email_pass
      TOTP_TOKEN_1_FILE: /run/secrets/totp_token_1
      TOTP_TOKEN_2_FILE: /run/secrets/totp_token_2
      TOTP_TOKEN_3_FILE: /run/secrets/totp_token_3
    secrets:
      - db_user
      - db_password
      - db_name
      - jwt_secret
      - email_user
      - email_pass
      - totp_token_1
      - totp_token_2
      - totp_token_3
    ports:
      - "${FRONTEND_PORT}:3000"
    profiles:
      - "prod"

volumes:
  postgres-data:
  seaweedfs-master-data:
  seaweedfs-volume-data:
