name: Redeploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  medc-production:
    runs-on: medc-local
    env:
      DOCKER_HOST: unix:///run/user/1003/docker.sock
      DOCKER_HOST_SOCKET: /run/user/1003/docker.sock
    steps:
      - name: Pull repo and deploy
        run: |
          cd /opt/services/team-medc/medc-prod
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          docker compose --profile prod up --build -d
          docker compose exec -T app-prod bun run db:migrate
